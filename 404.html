<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — страница не найдена | Hive</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root{
    --bg: #1B1812;
    --bg-card: #232017;
    --line: rgba(244,201,105,0.14);
    --line-strong: rgba(244,201,105,0.32);
    --honey: #F4C969;
    --amber: #E8A33D;
    --text: #F2ECDD;
    --text-dim: #B8AF9C;
    --text-faint: #82796A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    line-height:1.6;
    overflow-x:hidden;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .hex-field{
    position:absolute; top:0; left:0; width:100%; height:480px;
    background-image:
      repeating-linear-gradient(60deg, transparent, transparent 39px, var(--line) 39px, var(--line) 40px),
      repeating-linear-gradient(-60deg, transparent, transparent 39px, var(--line) 39px, var(--line) 40px);
    opacity:0.5;
    mask-image: linear-gradient(to bottom, black 0%, black 50%, transparent 100%);
    pointer-events:none;
  }

  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;position:relative;width:100%;}

  nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 0; position:relative; z-index:2;
  }
  .brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;}
  .brand-mark{width:30px;height:30px;flex-shrink:0;}
  .brand-name{font-size:18px;font-weight:600;letter-spacing:-0.01em;line-height:1.15;}
  .brand-name .sub{display:block;font-size:9px;font-weight:600;letter-spacing:0.14em;color:var(--text-faint);margin-top:1px;}
  .nav-links{display:flex;gap:32px;align-items:center;}
  .nav-links a{color:var(--text-dim);text-decoration:none;font-size:14px;transition:color 0.15s;}
  .nav-links a:hover{color:var(--honey);}
  .nav-cta{
    background:transparent;border:1px solid var(--line-strong);color:var(--honey);
    padding:9px 18px;border-radius:8px;font-size:14px;cursor:pointer;
    transition:background 0.15s,border-color 0.15s;font-family:inherit;text-decoration:none;
  }
  .nav-cta:hover{background:rgba(244,201,105,0.08);border-color:var(--honey);}

  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 0 80px;
    position:relative;
    z-index:2;
  }

  .error-card{
    text-align:center;
    max-width:520px;
    width:100%;
    padding:48px 32px;
    background:var(--bg-card);
    border:1px solid var(--line);
    border-radius:20px;
  }

  .error-code{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:16px;
  }
  .error-num{
    font-size:72px;
    font-weight:600;
    letter-spacing:-0.04em;
    line-height:1;
    color:var(--honey);
  }
  .error-bee{
    font-size:40px;
    line-height:1;
    flex-shrink:0;
    animation:bee-float 3s ease-in-out infinite;
  }
  @keyframes bee-float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
  }
  @media (prefers-reduced-motion: reduce){
    .error-bee{animation:none;}
  }

  .error-title{
    font-size:28px;
    font-weight:600;
    letter-spacing:-0.01em;
    margin-bottom:12px;
  }
  .error-text{
    font-size:16px;
    color:var(--text-dim);
    margin-bottom:32px;
    line-height:1.6;
  }

  .error-actions{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn-primary{
    background:var(--honey);color:#241B05;border:none;
    padding:14px 28px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:background 0.15s,transform 0.1s;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary:hover{background:#FFD685;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-outline{
    background:transparent;border:1px solid var(--line-strong);color:var(--text);
    padding:14px 28px;border-radius:9px;font-size:15px;cursor:pointer;font-family:inherit;
    transition:border-color 0.15s,background 0.15s;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-outline:hover{border-color:var(--honey);background:rgba(244,201,105,0.06);}

  footer{
    border-top:1px solid var(--line);padding:36px 0;position:relative;z-index:2;
    margin-top:auto;
  }
  .foot-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;}
  .foot-row span{font-size:13px;color:var(--text-faint);}
  .foot-right{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
  .foot-link{font-size:13px;color:var(--text-faint);text-decoration:none;transition:color 0.15s;}
  .foot-link:hover{color:var(--honey);}

  @media (max-width:680px){
    .nav-links{display:none;}
    .error-num{font-size:56px;}
    .error-bee{font-size:32px;}
    .error-title{font-size:24px;}
    .error-card{padding:36px 24px;}
    .error-actions{flex-direction:column;align-items:stretch;}
    .error-actions .btn-primary,
    .error-actions .btn-outline{justify-content:center;}
  }
</style>
</head>
<body>

<div class="hex-field" aria-hidden="true"></div>

<div class="wrap">
  <nav>
    <a class="brand" href="index.html">
      <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#F4C969" stroke-width="1.4"/>
        <polygon points="16,8 22,11.5 22,20.5 16,24 10,20.5 10,11.5" fill="#F4C969"/>
        <polygon points="16,11 19,12.7 19,19.3 16,21 13,19.3 13,12.7" fill="#1B1812"/>
      </svg>
      <span class="brand-name">Hive<span class="sub">SOLUTIONS</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html#modules">Модули</a>
      <a href="index.html#how">Как работает</a>
      <a href="index.html#decision-review">Разбор ситуации</a>
      <a href="index.html#diagnostics">Диагностика</a>
    </div>
    <a class="nav-cta" href="diagnostics.html">Диагностика</a>
  </nav>
</div>

<main>
  <div class="wrap">
    <div class="error-card">
      <div class="error-code">
        <span class="error-num">404</span>
        <span class="error-bee" aria-hidden="true">🐝</span>
      </div>
      <h1 class="error-title">Страница не найдена</h1>
      <p class="error-text">Возможно, ссылка устарела или была введена с ошибкой.</p>
      <div class="error-actions">
        <a class="btn-outline" href="index.html">← На главную</a>
        <a class="btn-primary" href="index.html#decision-review">Открыть форму заявки</a>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="foot-row">
      <span>Hive — модульная HR-система</span>
      <div class="foot-right">
        <a class="foot-link" href="privacy.html">Политика обработки персональных данных</a>
        <span>Санкт-Петербург</span>
      </div>
    </div>
  </div>
</footer>

</body>
</html>
